name: Publish Docker image

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  OLLAMA_VERSION: "0.20.3"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - model: "qwen2.5:0.5b"
            tag: "qwen2.5-0.5b"
          - model: "qwen2.5:1.5b"
            tag: "qwen2.5-1.5b"
          - model: "llama3.2:1b"
            tag: "llama3.2-1b"
          - model: "llama3.2:3b"
            tag: "llama3.2-3b"
          - model: "gemma3:1b"
            tag: "gemma3-1b"
          - model: "deepseek-r1:1.5b"
            tag: "deepseek-r1-1.5b"
          - model: "gemma4:e4b"
            tag: "gemma4-e4b"
        arch:
          - runner: ubuntu-latest
            platform: linux/amd64
            suffix: amd64
          - runner: ubuntu-latest-arm64-2-core
            platform: linux/arm64
            suffix: arm64

    runs-on: ${{ matrix.arch.runner }}

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push per-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.arch.platform }}
          push: true
          build-args: MODEL=${{ matrix.model }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ollama${{ env.OLLAMA_VERSION }}-${{ matrix.tag }}-${{ matrix.arch.suffix }}

  merge:
    needs: build
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - model: "qwen2.5:0.5b"
            tag: "qwen2.5-0.5b"
          - model: "qwen2.5:1.5b"
            tag: "qwen2.5-1.5b"
          - model: "llama3.2:1b"
            tag: "llama3.2-1b"
          - model: "llama3.2:3b"
            tag: "llama3.2-3b"
          - model: "gemma3:1b"
            tag: "gemma3-1b"
          - model: "deepseek-r1:1.5b"
            tag: "deepseek-r1-1.5b"
          - model: "gemma4:e4b"
            tag: "gemma4-e4b"

    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=ollama${{ env.OLLAMA_VERSION }}-${{ matrix.tag }}-
            type=raw,value=ollama${{ env.OLLAMA_VERSION }}-${{ matrix.tag }},enable={{is_default_branch}}

      - name: Create multi-arch manifest
        run: |
          for TAG in ${{ steps.meta.outputs.tags }}; do
            docker buildx imagetools create -t "${TAG}" \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ollama${{ env.OLLAMA_VERSION }}-${{ matrix.tag }}-amd64 \
              ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:ollama${{ env.OLLAMA_VERSION }}-${{ matrix.tag }}-arm64
          done